name: Yocto Build

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  yocto-build:
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Fix workspace ownership from prior run
        run: docker run --rm -v ${{ github.workspace }}:/work alpine sh -c "chown -R $(id -u):$(id -g) /work" 2>/dev/null || true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ecofleet-yocto:dev ./docker

      - name: Prepare build config
        run: |
          mkdir -p build-docker/conf
          cp backups/local.conf.working build-docker/conf/local.conf
          cp backups/bblayers.conf.working build-docker/conf/bblayers.conf

      - name: Fix layer paths
        run: |
          sed -i 's#/home/rsmith/cortex-yocto#/work#g' \
            build-docker/conf/bblayers.conf

      - name: Clear gobi-ui sstate cache to force rebuild from source
        run: |
          find /home/rsmith/yocto-cache/sstate -name "*gobi-ui*" -delete 2>/dev/null || true
          echo "Cleared gobi-ui sstate entries"

      - name: Set firmware version
        run: |
          VERSION="${{ github.ref_name }}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "${{ github.sha }}" ]; then
            VERSION="${{ github.sha }}"
            VERSION="${VERSION:0:8}"
          fi
          printf 'header:\n  version: 14\nlocal_conf_header:\n  version: |\n    ECOFLEET_FW_VERSION = "%s"\n' "$VERSION" > kas-version.yml

      - name: Inject device certificate
        env:
          DEVICE_CRT: ${{ secrets.DEVICE_CRT }}
          DEVICE_KEY: ${{ secrets.DEVICE_KEY }}
        run: |
          echo "$DEVICE_CRT" > meta-ecofleet/recipes-ecofleet/gobi-agent/files/device.crt
          echo "$DEVICE_KEY" > meta-ecofleet/recipes-ecofleet/gobi-agent/files/device.key

      - name: Inject OTA signing key
        env:
          SWUPDATE_SIGN_KEY: ${{ secrets.SWUPDATE_SIGN_KEY }}
        run: |
          # Only available when the secret is set; skip gracefully on dev builds
          if [ -n "$SWUPDATE_SIGN_KEY" ]; then
            mkdir -p /tmp/ota-keys
            echo "$SWUPDATE_SIGN_KEY" > /tmp/ota-keys/sign.key
          fi

      - name: Run Yocto build
        env:
          KAS_BUILD_DIR: /home/rsmith/yocto-cache/build
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e GIT_CONFIG_COUNT=1 \
            -e GIT_CONFIG_KEY_0=safe.directory \
            -e "GIT_CONFIG_VALUE_0=*" \
            -v ${{ github.workspace }}:/work \
            -v /home/rsmith/yocto-cache:/home/rsmith/yocto-cache \
            -w /work \
            -e KAS_BUILD_DIR=/home/rsmith/yocto-cache/build \
            ecofleet-yocto:dev \
            bash -c "kas build kas/dev.yml:kas-version.yml"

      - name: Fix workspace ownership after build
        if: always()
        run: docker run --rm -v ${{ github.workspace }}:/work alpine sh -c "chown -R $(id -u):$(id -g) /work"

      - name: Stage release files
        run: |
          rm -rf /tmp/yocto-release
          mkdir -p /tmp/yocto-release

          DEPLOY=/home/rsmith/yocto-cache/build/tmp/deploy/images/imx8mm-var-dart

          cp -L "$DEPLOY/imx-boot" /tmp/yocto-release/
          cp -L "$DEPLOY/u-boot.bin" /tmp/yocto-release/
          cp -L "$DEPLOY/u-boot-spl.bin" /tmp/yocto-release/
          cp -L "$DEPLOY/Image.gz" /tmp/yocto-release/
          cp -L "$DEPLOY/imx8mm-var-dart-dt8mcustomboard.dtb" /tmp/yocto-release/
          cp -L "$DEPLOY/ecofleet-image-imx8mm-var-dart.rootfs.wic.zst" /tmp/yocto-release/
          cp -L "$DEPLOY/ecofleet-image-imx8mm-var-dart.rootfs.wic.bmap" /tmp/yocto-release/
          cp -L "$DEPLOY/ecofleet-image-imx8mm-var-dart.rootfs.manifest" /tmp/yocto-release/

      - name: Build SWUpdate bundle
        run: |
          DEPLOY=/home/rsmith/yocto-cache/build/tmp/deploy/images/imx8mm-var-dart
          VERSION="${{ github.ref_name }}"
          # Strip leading 'v' from tag (v1.2.0 -> 1.2.0)
          VERSION="${VERSION#v}"
          # Fall back to short SHA for non-tag builds
          if [ -z "$VERSION" ] || [ "$VERSION" = "${{ github.sha }}" ]; then
            VERSION="${{ github.sha }}"
            VERSION="${VERSION:0:8}"
          fi

          SIGN_OPT=""
          if [ -f /tmp/ota-keys/sign.key ]; then
            SIGN_OPT="SWUPDATE_SIGN_KEY=/tmp/ota-keys/sign.key"
          fi

          env $SIGN_OPT \
            bash scripts/make-swu.sh "$DEPLOY" "$VERSION" \
            "/tmp/yocto-release/ecofleet-${VERSION}.swu"

      - name: List release artifacts
        run: ls -lh /tmp/yocto-release

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: /tmp/yocto-release/*
