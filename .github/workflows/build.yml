name: Yocto Build

on:
  push:
    branches:
      - main

jobs:
  docker-smoke-test:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Yocto Docker image
        run: docker build -t ecofleet-yocto:dev ./docker

      - name: Verify kas inside Docker
        run: docker run --rm ecofleet-yocto:dev kas --version
