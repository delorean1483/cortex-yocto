name: Yocto Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kas
        run: |
          pip3 install kas

      - name: Verify kas
        run: |
          kas --version
