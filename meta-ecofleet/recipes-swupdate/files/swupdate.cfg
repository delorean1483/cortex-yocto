globals :
{
    verbose = true;
    loglevel = 5;
    syslog = true;

    /* RSA bundle verification — cert baked in by swupdate-keys recipe */
    public-key-file = "/etc/swupdate/sign.crt";
};

download :
{
    /* gobi-agent invokes swupdate directly; no built-in downloader needed */
    retries = 3;
    timeout = 300;
};

identify :
[
    { name = "hardware"; value = "imx8mm-var-dart"; },
    { name = "vendor";   value = "ecofleet"; },
];
