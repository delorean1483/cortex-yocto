# /etc/ecofleet/gobi-agent.conf
# Runtime configuration for gobi-agent.
# Changes here take effect after: systemctl restart gobi-agent
# Poll interval and report_mode are also controllable via Device Shadow
# (shadow values take precedence once the device connects).

[modbus]
device=/dev/ttyUSB0

[api]
# API Gateway endpoint — set by Terraform, referenced by the dashboard
url=https://tphro82ot9.execute-api.us-east-1.amazonaws.com
